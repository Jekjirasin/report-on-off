<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกข้อมูลเครื่องจักรประจำวัน</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 sm:p-8 font-sans flex items-center justify-center">

    <div class="max-w-md w-full bg-white p-6 sm:p-8 rounded-2xl shadow-md border border-slate-200/80">
        
        <header class="mb-6 border-b border-slate-100 pb-4 flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                    📝 บันทึกข้อมูลเครื่องจักร
                </h1>
                <p class="text-slate-500 text-xs mt-1">ส่งข้อมูลบันทึกสถานะเข้าสู่ระบบ Google Sheets</p>
            </div>
            <div class="flex gap-1">
                <a href="index.html" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-1.5 px-2.5 rounded-lg transition-colors">หน้าแรก</a>
                <a href="dashboard.html" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold py-1.5 px-2.5 rounded-lg transition-colors">📊 แดชบอร์ด</a>
            </div>
        </header>

        <form id="status-form" onsubmit="submitForm(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">🤖 ชื่อเครื่องจักร / รายการ</label>
                <input type="text" id="form-device-name" required placeholder="เช่น CR-01 250 วันเวย์" 
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white font-medium">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">⏰ กะทำงาน</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="border border-slate-200 rounded-xl p-3 flex items-center justify-center gap-2 cursor-pointer hover:bg-slate-50 text-sm font-semibold has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50/50 text-slate-700">
                        <input type="radio" name="form-shift" value="กลางวัน" checked class="accent-indigo-600"> ☀️ กลางวัน
                    </label>
                    <label class="border border-slate-200 rounded-xl p-3 flex items-center justify-center gap-2 cursor-pointer hover:bg-slate-50 text-sm font-semibold has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50/50 text-slate-700">
                        <input type="radio" name="form-shift" value="กลางคืน" class="accent-indigo-600"> 🌙 กลางคืน
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">📊 สถานะการทำงาน</label>
                <select id="form-status" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white font-bold cursor-pointer text-slate-800">
                    <option value="บันทึกผล" class="text-green-600 font-bold">🟢 บันทึกผล</option>
                    <option value="ไม่ได้บันทึกผล" class="text-red-600 font-bold">🔴 ไม่ได้บันทึกผล</option>
                    <option value="ไม่ได้เปิดเครื่อง" class="text-zinc-600 font-bold">⚫ ไม่ได้เปิดเครื่อง</option>
                    <option value="รอการแก้ไข" class="text-amber-600 font-bold">🟠 รอการแก้ไข</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-200 active:scale-98 flex items-center justify-center gap-2 cursor-pointer text-sm">
                <span>📥</span> บันทึกข้อมูลลง Google Sheets
            </button>
        </form>

    </div>

    <script>
        // ⚠️ ลิงก์ Web App เดียวกันกับหน้าแดชบอร์ดของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbyxR5p9wETP6q5LF4yZ3hvZWKIJLf3tcgqGn8algLGEiKtGZyPGw7INRLmfLfxHL4ZQrw/exec"; 

        async function submitForm(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const deviceName = document.getElementById('form-device-name').value.trim();
            const shift = document.querySelector('input[name="form-shift"]:checked').value;
            const status = document.getElementById('form-status').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>⏳</span> กำลังส่งข้อมูล...`;
            submitBtn.className = "w-full mt-2 bg-slate-400 text-white font-bold py-3 px-4 rounded-xl text-sm flex items-center justify-center gap-2 cursor-not-allowed";

            try {
                // ส่งค่าแบบ POST ไปหา Google Apps Script
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ deviceName, shift, status })
                });
                
                alert("🎉 บันทึกข้อมูลเข้า Google Sheets เรียบร้อยแล้ว!");
                document.getElementById('status-form').reset(); // ล้างฟอร์มเคลียร์ค่าว่าง
                
            } catch (error) {
                console.error("Error submitting form:", error);
                alert("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล โปรดตรวจสอบสิทธิ์ Web App");
            } finally {
                // คืนค่าปุ่มให้กลับมาใช้งานได้ใหม่
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>📥</span> บันทึกข้อมูลลง Google Sheets`;
                submitBtn.className = "w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-200 active:scale-98 flex items-center justify-center gap-2 cursor-pointer text-sm";
            }
        }
    </script>
</body>
</html>
