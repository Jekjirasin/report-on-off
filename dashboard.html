<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ตรวจสอบสถานะเครื่องจักร</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 sm:p-8 font-sans antialiased text-slate-800">
    <div class="max-w-6xl mx-auto">
        
        <header class="mb-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200/80">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <span>🏭</span> Monitor Status เครื่องจักรประจำวัน
                </h1>
                <p class="text-slate-500 text-sm mt-1">ค้นหา ตรวจสอบ และคัดกรองสถานะเครื่องจักรย้อนหลัง</p>
            </div>
            
            <div class="w-full lg:w-auto flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3.5 py-2 rounded-xl w-full sm:w-60 focus-within:border-indigo-500 focus-within:bg-white transition-all">
                    <span class="text-slate-400 text-sm shrink-0">🔍</span>
                    <input type="text" id="search-input" oninput="renderTableData()" placeholder="พิมพ์ชื่อเครื่องที่ต้องการ..." class="bg-transparent text-slate-800 font-medium focus:outline-none text-sm w-full placeholder-slate-400">
                </div>
                
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3.5 py-2 rounded-xl shrink-0 focus-within:border-indigo-500 focus-within:bg-white transition-all">
                    <span class="text-sm shrink-0">🔌</span>
                    <select id="status-filter" onchange="renderTableData()" class="bg-transparent text-slate-800 font-semibold focus:outline-none cursor-pointer text-sm pr-2">
                        <option value="all">👁️ ทั้งหมด</option>
                        <option value="active_only">🟢 เฉพาะเครื่องที่ "เปิด"</option>
                        <option value="inactive_only">⚫ เฉพาะเครื่องที่ "ปิด"</option>
                        <option value="pending_only">🟠 เฉพาะเครื่องที่ "รอการแก้ไข"</option>
                    </select>
                </div>
                
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3.5 py-2 rounded-xl shrink-0 focus-within:border-indigo-500 focus-within:bg-white transition-all">
                    <span class="text-sm shrink-0">📅</span>
                    <input type="date" id="report-date" onchange="loadDeviceStatus()" class="bg-transparent text-slate-800 font-semibold focus:outline-none cursor-pointer text-sm">
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto shrink-0">
                    <button onclick="loadDeviceStatus()" class="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all duration-200 active:scale-95 flex items-center justify-center gap-1.5 cursor-pointer text-sm">
                        <span>🔄</span> รีเฟรช
                    </button>
                    <a href="index.html" class="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 px-4 rounded-xl text-sm flex items-center justify-center transition-colors">
                        หน้าแรก
                    </a>
                    <a href="form.html" class="flex-1 sm:flex-none bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm text-sm flex items-center justify-center gap-1.5 transition-colors">
                        <span>📝</span> เพิ่มข้อมูล
                    </a>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="summary-counters">
            <div class="bg-white p-4.5 rounded-xl border border-slate-200/80 shadow-xs">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><span>🟢</span> บันทึกผล</p>
                <p class="text-3xl font-extrabold text-green-600 mt-1.5" id="count-success">0</p>
            </div>
            <div class="bg-white p-4.5 rounded-xl border border-slate-200/80 shadow-xs">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><span>🔴</span> ไม่ได้บันทึกผล</p>
                <p class="text-3xl font-extrabold text-red-600 mt-1.5" id="count-fail">0</p>
            </div>
            <div class="bg-white p-4.5 rounded-xl border border-slate-200/80 shadow-xs">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><span>⚫</span> ไม่ได้เปิดเครื่อง</p>
                <p class="text-3xl font-extrabold text-zinc-600 mt-1.5" id="count-off">0</p>
            </div>
            <div class="bg-white p-4.5 rounded-xl border border-slate-200/80 shadow-xs">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><span>🟠</span> รอการแก้ไข</p>
                <p class="text-3xl font-extrabold text-amber-600 mt-1.5" id="count-pending">0</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 text-left">
                    <thead class="bg-slate-800 text-slate-200 text-xs uppercase font-bold tracking-wider">
                        <tr>
                            <th class="px-6 py-4.5 w-1/3">เครื่อง / รายการขวด</th>
                            <th class="px-6 py-4.5">กะทำงาน</th>
                            <th class="px-6 py-4.5">สถานะการทำงาน</th>
                            <th class="px-6 py-4.5">เวลาอัปเดตล่าสุด</th>
                            <th class="px-6 py-4.5 text-center w-24">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm text-slate-700 bg-white">
                        <tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">🕒 กำลังดึงข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyxR5p9wETP6q5LF4yZ3hvZWKIJLf3tcgqGn8algLGEiKtGZyPGw7INRLmfLfxHL4ZQrw/exec"; 
        let serverDataCache = []; 
        
        function setDefaultDate() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000; 
            const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, 10);
            document.getElementById('report-date').value = localISOTime;
        }
        
        async function loadDeviceStatus() {
            const tableBody = document.getElementById('table-body');
            const selectedDate = document.getElementById('report-date').value;
            tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">🕒 กำลังดึงข้อมูลของวันที่ ${selectedDate}...</td></tr>`;
            try {
                const response = await fetch(`${API_URL}?date=${selectedDate}`);
                serverDataCache = await response.json();
                renderTableData(); 
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-red-500 font-semibold">❌ ดึงข้อมูลไม่สำเร็จ โปรดตรวจสอบ Web App</td></tr>`;
            }
        }
        
        function renderTableData() {
            const tableBody = document.getElementById('table-body');
            const filterValue = document.getElementById('status-filter').value; 
            const searchQuery = document.getElementById('search-input').value.trim().toLowerCase(); 
            tableBody.innerHTML = ''; 
            let success = 0, fail = 0, off = 0, pending = 0;
            let displayedRowsCount = 0;
            
            if (serverDataCache.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 font-medium">📭 ไม่พบข้อมูลเครื่องจักรถูกบันทึกในวันที่เลือก</td></tr>`;
                updateCounters(0, 0, 0, 0);
                return;
            }
            
            serverDataCache.sort((a, b) => a.deviceName.localeCompare(b.deviceName, undefined, {numeric: true, sensitivity: 'base'}));
            
            serverDataCache.forEach(item => {
                let currentStatus = item.status ? item.status.trim() : "-";
                let deviceNameLower = item.deviceName ? item.deviceName.toLowerCase() : "";
                
                if (currentStatus === "บันทึกผล") success++;
                else if (currentStatus === "ไม่ได้บันทึกผล") fail++;
                else if (currentStatus === "ไม่ได้เปิดเครื่อง") off++;
                else if (currentStatus === "รอการแก้ไข") pending++;
                
                let isConditionMatch = true;
                if (filterValue === "active_only" && currentStatus === "ไม่ได้เปิดเครื่อง") isConditionMatch = false;
                else if (filterValue === "inactive_only" && currentStatus !== "ไม่ได้เปิดเครื่อง") isConditionMatch = false;
                else if (filterValue === "pending_only" && currentStatus !== "รอการแก้ไข") isConditionMatch = false;
                
                if (searchQuery !== "" && !deviceNameLower.includes(searchQuery)) isConditionMatch = false;
                if (!isConditionMatch) return; 
                
                displayedRowsCount++;
                let badgeColor = "bg-slate-100 text-slate-700 border-slate-200", dotColor = "bg-slate-400";
                
                if (currentStatus === "บันทึกผล") { badgeColor = "bg-green-50 text-green-700 border border-green-200"; dotColor = "bg-green-500"; }
                else if (currentStatus === "ไม่ได้บันทึกผล") { badgeColor = "bg-red-50 text-red-700 border border-red-200"; dotColor = "bg-red-500"; }
                else if (currentStatus === "ไม่ได้เปิดเครื่อง") { badgeColor = "bg-zinc-100 text-zinc-700 border border-zinc-200"; dotColor = "bg-zinc-500"; }
                else if (currentStatus === "รอการแก้ไข") { badgeColor = "bg-amber-50 text-amber-700 border border-amber-200"; dotColor = "bg-amber-500"; }
                
                const shiftBadge = item.shift === "กลางวัน" 
                    ? `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-amber-50 text-amber-800 border border-amber-200 rounded-lg text-xs font-bold">☀️ กลางวัน</span>`
                    : `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-indigo-50 text-indigo-800 border border-indigo-200 rounded-lg text-xs font-bold">🌙 กลางคืน</span>`;
                
                const editUrl = `form.html?deviceName=${encodeURIComponent(item.deviceName)}&shift=${encodeURIComponent(item.shift)}&status=${encodeURIComponent(currentStatus)}`;

                const rowHtml = `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-900">${item.deviceName}</td>
                        <td class="px-6 py-4">${shiftBadge}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${badgeColor}">
                                <span class="h-1.5 w-1.5 rounded-full ${dotColor} ${currentStatus === 'บันทึกผล' ? 'animate-pulse' : ''}"></span>
                                ${currentStatus}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-400 font-mono text-xs">${item.dateStr}</td>
                        <td class="px-6 py-4 text-center">
                            <a href="${editUrl}" class="inline-flex items-center gap-1 px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl text-xs transition-all active:scale-95 shadow-sm">
                                <span>✏️</span> แก้ไข
                            </a>
                        </td>
                    </tr>`;
                tableBody.innerHTML += rowHtml;
            });
            
            if (displayedRowsCount === 0) tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 font-medium">🔍 ไม่พบข้อมูลเครื่องจักรที่ตรงกับการค้นหา</td></tr>`;
            updateCounters(success, fail, off, pending);
        }
        
        function updateCounters(s, f, o, p) {
            document.getElementById('count-success').innerText = s;
            document.getElementById('count-fail').innerText = f;
            document.getElementById('count-off').innerText = o;
            document.getElementById('count-pending').innerText = p;
        }
        
        window.onload = function() { setDefaultDate(); loadDeviceStatus(); };
    </script>
</body>
</html>
