<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกข้อมูลเครื่องจักรประจำวัน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F2EC; --surface:#FFFFFF; --ink:#20242B; --ink-soft:#5B626D; --ink-faint:#9298A1;
    --steel:#2C3E52; --steel-2:#3D5670; --line:#E2E1D8;
    --green:#1F5A31; --green-bg:#E7F3E0; --green-line:#BEDDA9;
    --amber:#8A5A06; --amber-bg:#FCF0DA; --amber-line:#F2D093;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
    font-family:'Noto Sans Thai',sans-serif; display:flex; align-items:center; justify-content:center;
    padding:32px 20px;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    max-width:440px; width:100%; padding:26px;
  }
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:20px; gap:12px;}
  .topbar h1{font-family:'Kanit',sans-serif; font-weight:600; font-size:18px; margin:0 0 4px; color:var(--steel);}
  .topbar p{font-size:12.5px; color:var(--ink-soft); margin:0;}
  .nav{display:flex; gap:6px; flex-shrink:0;}
  .nav a{
    font-size:11.5px; font-weight:700; text-decoration:none; padding:7px 10px; border-radius:8px;
    background:#EEF0EC; color:var(--ink-soft); white-space:nowrap;
  }
  .nav a.accent{background:#E8ECF1; color:var(--steel);}
  label.field-label{display:block; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-bottom:7px;}
  .group{margin-bottom:18px;}
  input[type=text]{
    width:100%; background:#FAFAF6; border:1px solid var(--line); border-radius:12px;
    padding:11px 14px; font-size:14px; font-family:inherit; color:var(--ink); outline:none;
  }
  input[type=text]:focus{border-color:var(--steel-2); background:#fff;}
  .field-hint{font-size:11.5px; color:var(--ink-faint); margin:6px 2px 0;}
  .shift-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .shift-opt{
    border:1px solid var(--line); border-radius:12px; padding:12px; display:flex; align-items:center;
    justify-content:center; gap:7px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--ink-soft);
  }
  .shift-opt input{accent-color:var(--steel-2);}
  .shift-opt:has(:checked){border-color:var(--steel-2); background:#E8ECF1; color:var(--steel);}
  select{
    width:100%; background:#FAFAF6; border:1px solid var(--line); border-radius:12px;
    padding:11px 14px; font-size:14px; font-family:inherit; color:var(--ink); outline:none; font-weight:600; cursor:pointer;
  }
  select:focus{border-color:var(--steel-2); background:#fff;}
  button[type=submit]{
    width:100%; margin-top:6px; background:var(--steel); color:#fff; border:none; border-radius:12px;
    padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans Thai',sans-serif;
    display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .12s ease, background .12s ease;
  }
  button[type=submit]:active{transform:scale(.98);}
  button[type=submit]:disabled{background:var(--ink-faint); cursor:default;}
</style>
</head>
<body>
<div class="card">
  <div class="topbar">
    <div>
      <h1>📝 บันทึกข้อมูลเครื่องจักร</h1>
      <p>ส่งข้อมูลบันทึกสถานะเข้าสู่ระบบ Google Sheets</p>
    </div>
    <div class="nav">
      <a href="index.html">หน้าแรก</a>
      <a href="dashboard.html" class="accent">📊 แดชบอร์ด</a>
    </div>
  </div>

  <form id="status-form" onsubmit="submitForm(event)">
    <div class="group">
      <label class="field-label">🤖 ชื่อเครื่องจักร / รายการ</label>
      <input type="text" id="form-device-name" required placeholder="เช่น CR-01 250 วันเวย์" value="CR-">
      <p class="field-hint">พิมพ์ต่อจาก "CR-" ได้เลย เช่น CR-01</p>
    </div>
    <div class="group">
      <label class="field-label">⏰ กะทำงาน</label>
      <div class="shift-row">
        <label class="shift-opt"><input type="radio" name="form-shift" value="กลางวัน" checked> ☀️ กลางวัน</label>
        <label class="shift-opt"><input type="radio" name="form-shift" value="กลางคืน"> 🌙 กลางคืน</label>
      </div>
    </div>
    <div class="group">
      <label class="field-label">📊 สถานะการทำงาน</label>
      <select id="form-status">
        <option value="บันทึกผล">🟢 บันทึกผล</option>
        <option value="ไม่ได้บันทึกผล">🔴 ไม่ได้บันทึกผล</option>
        <option value="ไม่ได้เปิดเครื่อง">⚫ ไม่ได้เปิดเครื่อง</option>
        <option value="รอการแก้ไข">🟠 รอการแก้ไข</option>
      </select>
    </div>
    <button type="submit" id="submit-btn">📥 บันทึกข้อมูลลง Google Sheets</button>
  </form>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyxR5p9wETP6q5LF4yZ3hvZWKIJLf3tcgqGn8algLGEiKtGZyPGw7INRLmfLfxHL4ZQrw/exec";
  const DEFAULT_PREFIX = "CR-";

  function checkEditMode() {
    const urlParams = new URLSearchParams(window.location.search);
    const deviceName = urlParams.get('deviceName');
    const shift = urlParams.get('shift');
    const status = urlParams.get('status');
    const deviceInput = document.getElementById('form-device-name');

    if (deviceName) {
      deviceInput.value = deviceName;
      document.querySelector('.topbar h1').innerHTML = "✏️ แก้ไขข้อมูลเครื่องจักร";
      document.getElementById('submit-btn').innerHTML = "📥 อัปเดตข้อมูลลง Google Sheets";
    } else {
      // ฟอร์มใหม่: ตั้งค่าเริ่มต้นเป็น "CR-" แล้ววางเคอร์เซอร์ต่อท้ายให้พิมพ์ต่อได้เลย
      deviceInput.value = DEFAULT_PREFIX;
      requestAnimationFrame(() => {
        deviceInput.focus();
        deviceInput.setSelectionRange(deviceInput.value.length, deviceInput.value.length);
      });
    }
    if (shift) {
      document.getElementsByName('form-shift').forEach(radio => { if (radio.value === shift) radio.checked = true; });
    }
    if (status) {
      document.getElementById('form-status').value = status;
    }
  }
  window.addEventListener('DOMContentLoaded', checkEditMode);

  async function submitForm(event) {
    event.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    const deviceInput = document.getElementById('form-device-name');
    let deviceName = deviceInput.value.trim();

    // กันไว้เผื่อผู้ใช้ลบ prefix ทิ้งโดยไม่ตั้งใจ หรือส่งมาแค่ "CR-" เฉยๆ
    if (!deviceName || deviceName.toUpperCase() === DEFAULT_PREFIX) {
      alert("กรุณาระบุชื่อ/หมายเลขเครื่องจักรต่อท้าย " + DEFAULT_PREFIX);
      deviceInput.focus();
      return;
    }

    const shift = document.querySelector('input[name="form-shift"]:checked').value;
    const status = document.getElementById('form-status').value;

    submitBtn.disabled = true;
    submitBtn.innerHTML = "⏳ กำลังส่งข้อมูล...";

    try {
      await fetch(API_URL, { method: "POST", body: JSON.stringify({ deviceName, shift, status }) });
      alert("🎉 บันทึกข้อมูลเรียบร้อยแล้ว!");
      if (window.location.search.includes('deviceName')) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('status-form').reset();
        deviceInput.value = DEFAULT_PREFIX;
        requestAnimationFrame(() => {
          deviceInput.focus();
          deviceInput.setSelectionRange(deviceInput.value.length, deviceInput.value.length);
        });
      }
    } catch (error) {
      alert("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล");
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = "📥 บันทึกข้อมูลลง Google Sheets";
    }
  }
</script>
</body>
</html>
